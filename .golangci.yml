version: "2"
run:
  modules-download-mode: readonly
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: false
linters:
  enable:
    - bodyclose
    - cyclop
    - errorlint
    - gocognit
    - goconst
    - godot
    - gosec
    - misspell
    - nestif
    - nilerr
    - noctx
    - prealloc
    - rowserrcheck
    - sqlclosecheck
  disable:
    - exhaustruct
    - funlen
    - gochecknoglobals
    - lll
    - nlreturn
    - varnamelen
    - wsl
  settings:
    cyclop:
      max-complexity: 15
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocognit:
      min-complexity: 20
    goconst:
      min-len: 3
      min-occurrences: 3
    godot:
      scope: declarations
      exclude:
        - '^SPDX-License-Identifier:'
      capital: true
    gosec:
      severity: low
      confidence: low
    govet:
      enable-all: true
      settings:
        shadow:
          strict: false
    prealloc:
      simple: true
      range-loops: true
      for-loops: true
    staticcheck:
      checks:
        - all
        # The following stylistic/quickfix checks were not part of v1's
        # default staticcheck bundle; keep the v1 bar to avoid scope creep
        # in this release.
        - -ST1000 # Missing package comment
        - -ST1020 # Method comment form
        - -ST1021 # Type comment form
        - -QF1012 # Use fmt.Fprintf instead of WriteString(fmt.Sprintf)
  exclusions:
    generated: lax
    rules:
      - linters:
          - gosec
        path: _test\.go
        text: G101|G102|G103|G104|G301|G302|G303|G304|G305
      - linters:
          - gochecknoglobals
        path: main\.go
      - linters:
          - gochecknoinits
        path: pkg/config/
      - linters:
          - cyclop
          - gocognit
          - nestif
        path: _test\.go
      - linters:
          - goconst
        path: (.+)_test\.go
      - linters:
          - noctx
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
severity:
  default: error
  rules:
    - linters:
        - errcheck
        - govet
        - staticcheck
        - unused
      severity: error
    - linters:
        - gosec
      severity: warning
    - linters:
        - godot
        - gofmt
        - misspell
      severity: info
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/astrostl/slack-butler
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
